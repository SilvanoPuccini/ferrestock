{% extends "base.html" %}

{% block title %}Inicio | FerreStock{% endblock %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3">
    <div class="container-fluid py-3">
        <h1 class="display-5 fw-bold">FerreStock</h1>
        <p class="col-md-8 fs-4">
            Sistema de inventario profesional para ferretería y corralón.
        </p>
        {% if user.is_authenticated %}
            <a href="{% url 'dashboard:home' %}" class="btn btn-dark btn-lg">Ir al dashboard</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-dark btn-lg">Iniciar sesión</a>
        {% endif %}
    </div>
</div>
{% endblock %}
