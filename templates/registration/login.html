{% extends "base.html" %}

{% block title %}Login | FerreStock{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3 mb-4">Iniciar sesión</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark">Entrar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
