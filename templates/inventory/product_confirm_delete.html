{% extends "base.html" %}

{% block title %}Eliminar producto | FerreStock{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body">
                <h1 class="h3 mb-3">Eliminar producto</h1>
                <p>
                    ¿Seguro que quieres eliminar el producto
                    <strong>{{ object.name }}</strong>?
                </p>
                <p class="text-muted">
                    Esta acción no se puede deshacer.
                </p>

                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'inventory:product_detail' object.pk %}" class="btn btn-outline-secondary">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-danger">
                        Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
